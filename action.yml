name: 'SSH Run'
description: 'Run commands on a remote server over SSH'

inputs:
  host:
    description: 'SSH host'
    required: true
  user:
    description: 'SSH user'
    required: true
  key:
    description: 'SSH private key'
    required: true
  port:
    description: 'SSH port'
    required: false
  known_hosts:
    description: 'Known hosts entry'
    required: false
  script:
    description: 'Script to execute'
    required: true
  timeout:
    description: 'Connection timeout in seconds'
    required: false

outputs:
  stdout:
    description: 'Standard output from the remote command'
    value: ${{ steps.run.outputs.stdout }}
  exit_code:
    description: 'Exit code of the remote command'
    value: ${{ steps.run.outputs.exit_code }}

runs:
  using: 'composite'
  steps:
    - name: Download ssh-action binary
      shell: bash
      run: |
        REPO="${{ github.action_repository }}"
        REF="${{ github.action_ref }}"
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
        esac
        URL="https://github.com/${REPO}/releases/download/${REF}/ssh-action-linux-${ARCH}"
        curl -sL "$URL" -o "${{ github.action_path }}/ssh-action"
        chmod +x "${{ github.action_path }}/ssh-action"

    - name: Run SSH command
      id: run
      shell: bash
      env:
        INPUT_HOST: ${{ inputs.host }}
        INPUT_USER: ${{ inputs.user }}
        INPUT_KEY: ${{ inputs.key }}
        INPUT_PORT: ${{ inputs.port }}
        INPUT_KNOWN_HOSTS: ${{ inputs.known_hosts }}
        INPUT_SCRIPT: ${{ inputs.script }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
      run: ${{ github.action_path }}/ssh-action
